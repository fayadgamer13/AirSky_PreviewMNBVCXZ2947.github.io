<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wrong Page Turn - AirSky Hub</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: var(--bg);
            font-family: var(--main-font);
            color: var(--text);
            text-align: center;
        }
        
.error-container {
            background: var(--card);
            padding: 50px;
            border-radius: 30px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 40px rgba(86, 83, 87, 0.4);
            max-width: 400px;
        }
        h1 {
            font-size: 8rem;
            margin: 0;
            color: var(--accent);
            text-shadow: 0 0 20px rgba(255, 251, 0, 0.3);
        }
        p {
            font-size: 1.2rem;
            color: var(--text-soft);
            margin-bottom: 30px;
        }
        .back-home {
            display: inline-block;
            padding: 15px 30px;
            background: var(--accent);
            color: #000;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: 0.3s;
        }
        .back-home:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px var(--accent);
        }
    </style>
</head>
<body>
    <div class="error-container">
        <h1>404</h1>
        <p>Oops! This part of the sky seems empty.</p>
        <a href="https://fayadgamer13.github.io/AirSky.github.io" class="back-home">Return to Hub</a>
    </div>
</body>
</html>
