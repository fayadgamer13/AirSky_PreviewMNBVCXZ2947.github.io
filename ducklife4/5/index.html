<!DOCTYPE html>
<html lang="en">
<head>
    <title>Duck Life 5</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
    <style>
        html, body { margin: 0; height: 100%; background: black; }
        #flash-container { width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
        ruffle-player { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="flash-container"></div>

    <script>
        const ruffle = window.RufflePlayer.newest();
        const player = ruffle.createPlayer();
        document.getElementById("flash-container").appendChild(player);
        player.load("https://cdn.jsdelivr.net/gh/jackilyna/web-flash@eeca0ee340c64e455095970004dfce5a9c6e791a/webfl/dlife.swf");
    </script>
</body>
</html>
