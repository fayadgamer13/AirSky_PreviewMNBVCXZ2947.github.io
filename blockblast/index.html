<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Block Blast Clone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #2b3b7d;
            --board-bg: #1a234d;
            --cell-empty: #242e5e;
        }

        body {
            font-family: 'Fredoka', sans-serif;
            touch-action: none;
            overflow: hidden;
            background-color: var(--bg-color);
            margin: 0;
            user-select: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
        }

        /* The 3D Beveled Block Look */
        .block-3d {
            border-radius: 4px;
            position: relative;
            box-shadow: inset 0 2px 4px rgba(255,255,255,0.4), 
                        inset 0 -2px 4px rgba(0,0,0,0.3);
            border: 1px solid rgba(0,0,0,0.15);
        }

        .block-blue { background: linear-gradient(135deg, #4da9ff, #2b70ff); }
        .block-orange { background: linear-gradient(135deg, #ff9f4d, #ff6b2b); }
        .block-purple { background: linear-gradient(135deg, #b34dff, #7e2bff); }
        .block-green { background: linear-gradient(135deg, #4dff88, #2bff62); }
        .block-yellow { background: linear-gradient(135deg, #ffd94d, #ffb32b); }
        .block-cyan { background: linear-gradient(135deg, #4dffff, #2bc6ff); }
        .block-red { background: linear-gradient(135deg, #ff4d4d, #ff2b2b); }

        .grid-cell {
            background-color: var(--cell-empty);
            border-radius: 4px;
            transition: background-color 0.05s linear;
        }

        .dragging-container {
            position: fixed;
            z-index: 1000;
            pointer-events: none;
            transform: scale(1.1);
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.6));
            transition: transform 0.1s ease-out;
        }

        .ghost {
            opacity: 0.45 !important;
            box-shadow: none !important;
        }

        @keyframes clear-pop {
            0% { transform: scale(1); filter: brightness(2); }
            100% { transform: scale(0); opacity: 0; }
        }

        .clearing {
            animation: clear-pop 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        .score-heart {
            position: relative;
            background: radial-gradient(circle, #ff4dee 0%, transparent 70%);
            width: 140px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
        }

        #tray div:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <!-- Top Bar -->
    <div class="w-full max-w-md px-6 pt-4 flex justify-between items-center z-10">
        <div class="flex items-center gap-2 bg-black/20 px-3 py-1 rounded-full">
            <span class="text-xl">👑</span>
            <span id="highScore" class="text-yellow-400 text-xl font-bold">2983</span>
        </div>
        <button class="text-white text-2xl opacity-80 hover:rotate-45 transition-transform">⚙️</button>
    </div>

    <!-- Central Score -->
    <div class="score-heart">
        <span id="score" class="text-5xl font-bold text-white drop-shadow-lg">0</span>
    </div>

    <!-- Game Board -->
    <div class="w-full max-w-sm px-4 flex-grow-0">
        <div id="game-board" 
             style="background-color: var(--board-bg);"
             class="p-1.5 rounded-xl grid grid-cols-8 grid-rows-8 gap-1 aspect-square w-full shadow-2xl border-4 border-white/5">
            <!-- Cells generated by JS -->
        </div>
    </div>

    <!-- Shape Tray -->
    <div id="tray" class="w-full max-w-sm px-4 flex justify-between items-center h-40 gap-2 mb-4">
        <!-- Shapes generated by JS -->
    </div>

    <!-- Game Over -->
    <div id="game-over" class="fixed inset-0 bg-black/80 backdrop-blur-md hidden z-[2000] flex items-center justify-center p-6">
        <div class="bg-white p-8 rounded-[40px] text-center max-w-xs w-full shadow-2xl scale-110">
            <h2 class="text-3xl font-bold mb-2 text-slate-800">Game Over</h2>
            <p class="text-slate-500 mb-6">Score: <span id="final-score" class="font-bold text-blue-600">0</span></p>
            <button onclick="resetGame()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-3xl shadow-lg active:scale-95 transition-transform text-xl">
                PLAY AGAIN
            </button>
        </div>
    </div>

    <script>
        const GRID_SIZE = 8;
        const boardElement = document.getElementById('game-board');
        const trayElement = document.getElementById('tray');
        const scoreElement = document.getElementById('score');
        const highScoreElement = document.getElementById('highScore');
        const gameOverModal = document.getElementById('game-over');
        
        let score = 0;
        let highScore = localStorage.getItem('bb_highScore') || 2983;
        let board = Array(GRID_SIZE).fill().map(() => Array(GRID_SIZE).fill(0));
        let trayShapes = [null, null, null];
        
        let activePointerId = null;
        let draggingElement = null;
        let dragData = null;

        const COLOR_CLASSES = ['', 'block-blue', 'block-orange', 'block-purple', 'block-green', 'block-yellow', 'block-cyan', 'block-red'];

        const SHAPE_DATA = [
            { color: 1, layout: [[0,0], [0,1], [1,0], [1,1]] }, // 2x2
            { color: 2, layout: [[0,0]] }, // 1x1
            { color: 3, layout: [[0,0], [1,0], [2,0]] }, // 3x1
            { color: 3, layout: [[0,0], [0,1], [0,2]] }, // 1x3
            { color: 4, layout: [[0,1], [1,1], [2,1], [2,0]] }, // L
            { color: 5, layout: [[0,0], [0,1], [0,2], [0,3]] }, // 4x1
            { color: 6, layout: [[0,1], [1,0], [1,1], [1,2]] }, // T
            { color: 7, layout: [[0,0], [1,0], [1,1]] }, // Small L
        ];

        highScoreElement.innerText = highScore;

        function initBoard() {
            boardElement.innerHTML = '';
            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'grid-cell';
                    cell.dataset.row = r;
                    cell.dataset.col = c;
                    boardElement.appendChild(cell);
                }
            }
        }

        function generateTray() {
            trayElement.innerHTML = '';
            for (let i = 0; i < 3; i++) {
                const shape = SHAPE_DATA[Math.floor(Math.random() * SHAPE_DATA.length)];
                trayShapes[i] = shape;
                renderTrayShape(shape, i);
            }
            checkGameStatus();
        }

        function renderTrayShape(shape, index) {
            const container = document.createElement('div');
            container.className = 'flex-1 h-full flex items-center justify-center cursor-grab active:cursor-grabbing transition-all';
            
            const rows = Math.max(...shape.layout.map(p => p[0])) + 1;
            const cols = Math.max(...shape.layout.map(p => p[1])) + 1;
            
            const grid = document.createElement('div');
            grid.style.display = 'grid';
            grid.style.gridTemplateRows = `repeat(${rows}, 18px)`;
            grid.style.gridTemplateColumns = `repeat(${cols}, 18px)`;
            grid.style.gap = '2px';
            grid.className = 'pointer-events-none';

            shape.layout.forEach(([r, c]) => {
                const block = document.createElement('div');
                block.className = `w-full h-full block-3d ${COLOR_CLASSES[shape.color]}`;
                block.style.gridRow = r + 1;
                block.style.gridColumn = c + 1;
                grid.appendChild(block);
            });

            container.appendChild(grid);
            container.onpointerdown = (e) => startDrag(e, shape, index, container);
            trayElement.appendChild(container);
        }

        function startDrag(e, shape, index, container) {
            if (activePointerId !== null) return;
            activePointerId = e.pointerId;
            container.setPointerCapture(e.pointerId);

            dragData = { shape, index, container };
            container.style.visibility = 'hidden';

            // Create visual drag representation
            draggingElement = document.createElement('div');
            draggingElement.className = 'dragging-container';
            
            const cellSize = boardElement.offsetWidth / 8;
            const rows = Math.max(...shape.layout.map(p => p[0])) + 1;
            const cols = Math.max(...shape.layout.map(p => p[1])) + 1;

            const grid = document.createElement('div');
            grid.style.display = 'grid';
            grid.style.gridTemplateRows = `repeat(${rows}, ${cellSize - 2}px)`;
            grid.style.gridTemplateColumns = `repeat(${cols}, ${cellSize - 2}px)`;
            grid.style.gap = '2px';

            shape.layout.forEach(([r, c]) => {
                const block = document.createElement('div');
                block.className = `w-full h-full block-3d ${COLOR_CLASSES[shape.color]}`;
                block.style.gridRow = r + 1;
                block.style.gridColumn = c + 1;
                grid.appendChild(block);
            });

            draggingElement.appendChild(grid);
            document.body.appendChild(draggingElement);

            updateDragPosition(e);

            container.onpointermove = updateDragPosition;
            container.onpointerup = (upEvent) => {
                container.releasePointerCapture(upEvent.pointerId);
                endDrag(upEvent);
                container.onpointermove = null;
                container.onpointerup = null;
                activePointerId = null;
            };
        }

        function updateDragPosition(e) {
            if (!draggingElement) return;

            // Follow finger with fixed vertical offset
            const offset = 120; 
            const x = e.clientX - (draggingElement.offsetWidth / 2);
            const y = e.clientY - (draggingElement.offsetHeight / 2) - offset;

            draggingElement.style.left = `${x}px`;
            draggingElement.style.top = `${y}px`;

            clearGhosts();
            const target = getTargetCell();
            if (target && canPlace(dragData.shape, target.r, target.c)) {
                dragData.shape.layout.forEach(([dr, dc]) => {
                    const cell = getCellEl(target.r + dr, target.c + dc);
                    if (cell) cell.classList.add('ghost', COLOR_CLASSES[dragData.shape.color], 'block-3d');
                });
            }
        }

        function endDrag(e) {
            if (!draggingElement) return;

            const target = getTargetCell();
            let success = false;

            if (target && canPlace(dragData.shape, target.r, target.c)) {
                placeShape(dragData.shape, target.r, target.c);
                trayShapes[dragData.index] = null;
                dragData.container.onpointerdown = null;
                dragData.container.innerHTML = '';
                success = true;
                
                checkLines();
                if (trayShapes.every(s => s === null)) generateTray();
                else checkGameStatus();
            }

            if (!success) {
                dragData.container.style.visibility = 'visible';
            }

            draggingElement.remove();
            draggingElement = null;
            dragData = null;
            clearGhosts();
        }

        function getTargetCell() {
            const boardRect = boardElement.getBoundingClientRect();
            const dragRect = draggingElement.getBoundingClientRect();
            const cellSize = boardElement.offsetWidth / 8;

            // Use the top-left-most block of the shape as the pivot for calculation
            const pivotX = dragRect.left + (cellSize / 2);
            const pivotY = dragRect.top + (cellSize / 2);

            const r = Math.floor((pivotY - boardRect.top) / cellSize);
            const c = Math.floor((pivotX - boardRect.left) / cellSize);

            if (r >= 0 && r < 8 && c >= 0 && c < 8) return { r, c };
            return null;
        }

        function canPlace(shape, r, c) {
            return shape.layout.every(([dr, dc]) => {
                const nr = r + dr;
                const nc = c + dc;
                return nr >= 0 && nr < 8 && nc >= 0 && nc < 8 && board[nr][nc] === 0;
            });
        }

        function placeShape(shape, r, c) {
            shape.layout.forEach(([dr, dc]) => {
                const nr = r + dr;
                const nc = c + dc;
                board[nr][nc] = shape.color;
                const el = getCellEl(nr, nc);
                el.className = `grid-cell block-3d ${COLOR_CLASSES[shape.color]}`;
            });
            addScore(shape.layout.length);
        }

        function checkLines() {
            let fullRows = [];
            let fullCols = [];

            for (let i = 0; i < 8; i++) {
                if (board[i].every(v => v !== 0)) fullRows.push(i);
                let colFull = true;
                for (let j = 0; j < 8; j++) if (board[j][i] === 0) colFull = false;
                if (colFull) fullCols.push(i);
            }

            if (fullRows.length > 0 || fullCols.length > 0) {
                const lines = fullRows.length + fullCols.length;
                addScore(lines * 100 + (lines > 1 ? lines * 50 : 0));

                fullRows.forEach(r => {
                    for(let c=0; c<8; c++) {
                        getCellEl(r, c).classList.add('clearing');
                        board[r][c] = 0;
                    }
                });
                fullCols.forEach(c => {
                    for(let r=0; r<8; r++) {
                        getCellEl(r, c).classList.add('clearing');
                        board[r][c] = 0;
                    }
                });

                setTimeout(() => {
                    document.querySelectorAll('.clearing').forEach(el => {
                        el.className = 'grid-cell';
                    });
                }, 300);
            }
        }

        function checkGameStatus() {
            const possible = trayShapes.some((s) => {
                if (!s) return false;
                for (let r = 0; r < 8; r++) {
                    for (let c = 0; c < 8; c++) {
                        if (canPlace(s, r, c)) return true;
                    }
                }
                return false;
            });

            if (!possible && trayShapes.some(s => s !== null)) {
                setTimeout(() => {
                    document.getElementById('final-score').innerText = score;
                    gameOverModal.classList.remove('hidden');
                }, 1000);
            }
        }

        function addScore(pts) {
            score += pts;
            scoreElement.innerText = score;
            if (score > highScore) {
                highScore = score;
                highScoreElement.innerText = highScore;
                localStorage.setItem('bb_highScore', highScore);
            }
        }

        function clearGhosts() {
            document.querySelectorAll('.ghost').forEach(el => {
                el.className = 'grid-cell';
            });
        }

        function getCellEl(r, c) {
            return document.querySelector(`.grid-cell[data-row="${r}"][data-col="${c}"]`);
        }

        function resetGame() {
            score = 0;
            scoreElement.innerText = '0';
            board = Array(GRID_SIZE).fill().map(() => Array(GRID_SIZE).fill(0));
            gameOverModal.classList.add('hidden');
            initBoard();
            generateTray();
        }

        window.onload = () => {
            initBoard();
            generateTray();
        };
    </script>
</body>
</html>
